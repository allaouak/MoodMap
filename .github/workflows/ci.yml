name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality:
    name: Typecheck / Lint / Test / Audit
    runs-on: ubuntu-latest
    needs: secrets

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.2"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Tests
        run: pnpm -r test --ci --coverage

      - name: Audit
        run: pnpm audit --audit-level moderate

  rls:
    name: RLS Tests
    runs-on: ubuntu-latest
    needs: secrets

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local
        run: supabase start

      - name: Run RLS tests
        run: |
          PGPASSWORD=postgres psql \
            -h 127.0.0.1 -p 54322 \
            -U postgres -d postgres \
            -v ON_ERROR_STOP=1 \
            -f supabase/tests/rls_verification.sql

      - name: Stop Supabase
        if: always()
        run: supabase stop

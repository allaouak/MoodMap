name: E2E (Maestro iOS)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-ios:
    name: Maestro E2E — iOS Simulator
    runs-on: macos-15
    timeout-minutes: 60

    env:
      APP_ENV: development
      APP_ID: com.khettal.moodmap.dev
      MAESTRO_CLI_NO_ANALYTICS: true
      MAESTRO_DRIVER_STARTUP_TIMEOUT: 600000
      SENTRY_DISABLE_AUTO_UPLOAD: true
      TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_IS_E2E: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.2"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate E2E configuration
        run: |
          test -n "$TEST_EMAIL" || (echo "Missing E2E_TEST_EMAIL secret" && exit 1)
          test -n "$TEST_PASSWORD" || (echo "Missing E2E_TEST_PASSWORD secret" && exit 1)
          test -n "$EXPO_PUBLIC_SUPABASE_URL" || (echo "Missing EXPO_PUBLIC_SUPABASE_URL secret" && exit 1)
          test -n "$EXPO_PUBLIC_SUPABASE_ANON_KEY" || (echo "Missing EXPO_PUBLIC_SUPABASE_ANON_KEY secret" && exit 1)

      - name: Verify E2E credentials against Supabase
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${EXPO_PUBLIC_SUPABASE_URL}/auth/v1/token?grant_type=password" \
            -H "apikey: ${EXPO_PUBLIC_SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"${TEST_EMAIL}\",\"password\":\"${TEST_PASSWORD}\"}")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Supabase rejected E2E credentials (HTTP $HTTP_STATUS)."
            echo "Check that TEST_EMAIL and TEST_PASSWORD secrets match the account in Supabase Auth."
            exit 1
          fi
          echo "Credentials OK (Supabase HTTP $HTTP_STATUS)"

      - name: Write CI .env for mobile app
        working-directory: apps/mobile
        run: |
          printf 'EXPO_PUBLIC_SUPABASE_URL=%s\n' "$EXPO_PUBLIC_SUPABASE_URL" > .env
          printf 'EXPO_PUBLIC_SUPABASE_ANON_KEY=%s\n' "$EXPO_PUBLIC_SUPABASE_ANON_KEY" >> .env
          printf 'EXPO_PUBLIC_IS_E2E=true\n' >> .env

      - name: Generate iOS native project
        working-directory: apps/mobile
        run: pnpm exec expo prebuild --platform ios --clean --no-install

      - name: Install iOS pods
        working-directory: apps/mobile/ios
        run: pod install

      - name: Build iOS simulator app
        working-directory: apps/mobile
        run: |
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          if [ -z "$WORKSPACE" ]; then
            echo "No iOS workspace generated. Current ios directory:"
            find ios -maxdepth 2 -print
            exit 1
          fi

          SCHEME=$(xcodebuild -list -json -workspace "$WORKSPACE" | ruby -rjson -e 'data = JSON.parse(STDIN.read); puts data.dig("workspace", "schemes")&.find { |s| s.include?("MoodMap") } || data.dig("workspace", "schemes")&.first')
          if [ -z "$SCHEME" ]; then
            echo "No Xcode scheme found in $WORKSPACE"
            xcodebuild -list -workspace "$WORKSPACE"
            exit 1
          fi

          echo "Building workspace $WORKSPACE with scheme $SCHEME"
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone 16 Pro" | head -1 | grep -oE '[A-F0-9-]{36}')
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV

      - name: Install app on simulator
        working-directory: apps/mobile
        run: |
          APP_PATH=$(find "$PWD/ios/build/Build/Products/Release-iphonesimulator" -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No simulator app produced. Release products:"
            find ios/build/Build/Products -maxdepth 3 -print
            exit 1
          fi

          echo "Installing $APP_PATH"
          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Validate installed app bundle
        run: xcrun simctl get_app_container "$SIMULATOR_UDID" "$APP_ID" app

      - name: Warm up simulator services
        run: |
          xcrun simctl launch "$SIMULATOR_UDID" com.apple.Preferences || true
          sleep 15
          xcrun simctl terminate "$SIMULATOR_UDID" com.apple.Preferences || true

      - name: Install Maestro
        run: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Run Maestro flows
        run: |
          export PATH="$PATH:$HOME/.maestro/bin"
          mkdir -p maestro-reports maestro-artifacts maestro-debug
          flows=(
            auth-login
            check-in-smoke
            calendar-navigation
            insights-smoke
            settings-delete-account-cancel
            auth-login-failed
          )

          failed_flows=()
          for flow in "${flows[@]}"; do
            echo "Running Maestro flow: $flow"
            xcrun simctl terminate "$SIMULATOR_UDID" "$APP_ID" >/dev/null 2>&1 || true
            # Reinstall for flows that need a clean Keychain — ensures clearKeychain truly takes effect
            if [[ "$flow" == "auth-login" ]] || [[ "$flow" == "insights-smoke" ]] || [[ "$flow" == "auth-login-failed" ]]; then
              xcrun simctl uninstall "$SIMULATOR_UDID" "$APP_ID" || true
              xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"
            fi
            if maestro test ".maestro/$flow.yaml" \
              --env APP_ID="$APP_ID" \
              --env TEST_EMAIL="$TEST_EMAIL" \
              --env TEST_PASSWORD="$TEST_PASSWORD" \
              --test-output-dir "maestro-artifacts/$flow" \
              --debug-output "maestro-debug/$flow" \
              --format junit \
              --output "maestro-reports/$flow.xml"; then
              echo "[OK] $flow"
            else
              echo "[FAILED] $flow"
              failed_flows+=("$flow")
            fi
          done

          if [ ${#failed_flows[@]} -gt 0 ]; then
            echo "Failed flows: ${failed_flows[*]}"
            exit 1
          fi

      - name: Collect simulator logs
        if: always()
        run: |
          mkdir -p simulator-logs
          xcrun simctl spawn "$SIMULATOR_UDID" log show \
            --last 30m \
            --style compact \
            --predicate 'process == "MoodMap"' \
            > simulator-logs/moodmap.log || true

      - name: Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts
          path: |
            maestro-reports/*.xml
            maestro-artifacts/**
            maestro-debug/**
            simulator-logs/**

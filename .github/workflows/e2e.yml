name: E2E (Maestro iOS)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-ios:
    name: Maestro E2E — iOS Simulator
    runs-on: macos-15
    timeout-minutes: 60

    env:
      APP_ID: com.khettal.moodmap.dev
      TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.2"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate iOS native project
        working-directory: apps/mobile
        run: pnpm exec expo prebuild --platform ios --clean --no-install

      - name: Install iOS pods
        working-directory: apps/mobile/ios
        run: pod install

      - name: Build iOS simulator app
        working-directory: apps/mobile
        run: |
          xcodebuild \
            -workspace ios/MoodMap.xcworkspace \
            -scheme MoodMap \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone 16 Pro" | head -1 | grep -oE '[A-F0-9-]{36}')
          xcrun simctl boot "$UDID"
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV

      - name: Install app on simulator
        working-directory: apps/mobile
        run: xcrun simctl install "$SIMULATOR_UDID" ios/build/Build/Products/Debug-iphonesimulator/MoodMap.app

      - name: Install Maestro
        run: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Run Maestro flows
        run: |
          export PATH="$PATH:$HOME/.maestro/bin"
          maestro test .maestro/ \
            --env APP_ID="$APP_ID" \
            --env TEST_EMAIL="$TEST_EMAIL" \
            --env TEST_PASSWORD="$TEST_PASSWORD" \
            --format junit \
            --output maestro-report.xml

      - name: Upload Maestro report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report
          path: maestro-report.xml

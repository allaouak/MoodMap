name: E2E (Maestro iOS)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-ios:
    name: Maestro E2E — iOS Simulator
    runs-on: macos-15
    timeout-minutes: 60

    env:
      APP_ENV: development
      APP_ID: com.khettal.moodmap.dev
      MAESTRO_DRIVER_STARTUP_TIMEOUT: 300000
      TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.2"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate E2E configuration
        run: |
          test -n "$TEST_EMAIL" || (echo "Missing E2E_TEST_EMAIL secret" && exit 1)
          test -n "$TEST_PASSWORD" || (echo "Missing E2E_TEST_PASSWORD secret" && exit 1)
          test -n "$EXPO_PUBLIC_SUPABASE_URL" || (echo "Missing EXPO_PUBLIC_SUPABASE_URL secret" && exit 1)
          test -n "$EXPO_PUBLIC_SUPABASE_ANON_KEY" || (echo "Missing EXPO_PUBLIC_SUPABASE_ANON_KEY secret" && exit 1)

      - name: Generate iOS native project
        working-directory: apps/mobile
        run: pnpm exec expo prebuild --platform ios --clean --no-install

      - name: Install iOS pods
        working-directory: apps/mobile/ios
        run: pod install

      - name: Build iOS simulator app
        working-directory: apps/mobile
        run: |
          xcodebuild \
            -workspace ios/MoodMap.xcworkspace \
            -scheme MoodMap \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone 16 Pro" | head -1 | grep -oE '[A-F0-9-]{36}')
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV

      - name: Install app on simulator
        working-directory: apps/mobile
        run: xcrun simctl install "$SIMULATOR_UDID" ios/build/Build/Products/Debug-iphonesimulator/MoodMap.app

      - name: Validate installed app bundle
        run: xcrun simctl get_app_container "$SIMULATOR_UDID" "$APP_ID" app

      - name: Install Maestro
        run: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Run Maestro flows
        run: |
          export PATH="$PATH:$HOME/.maestro/bin"
          mkdir -p maestro-reports
          flows=(
            auth-login-failed
            auth-login
            check-in-smoke
            calendar-navigation
            insights-smoke
            settings-delete-account-cancel
          )

          for flow in "${flows[@]}"; do
            echo "Running Maestro flow: $flow"
            maestro test ".maestro/$flow.yaml" \
              --env APP_ID="$APP_ID" \
              --env TEST_EMAIL="$TEST_EMAIL" \
              --env TEST_PASSWORD="$TEST_PASSWORD" \
              --format junit \
              --output "maestro-reports/$flow.xml"
          done

      - name: Upload Maestro report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report
          path: maestro-reports/*.xml

appId: ${APP_ID}
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 15000
- tapOn:
    id: "welcome-login-button"
- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 15000
- tapOn:
    id: "login-email-input"
- inputText: "${TEST_EMAIL}"
- tapOn:
    id: "login-password-input"
- inputText: "${TEST_PASSWORD}"
- hideKeyboard
- tapOn:
    id: "login-submit-button"
- extendedWaitUntil:
    notVisible:
      id: "login-submit-button"
    timeout: 15000
- runFlow:
    when:
      visible:
        id: "onboarding-next-button"
    commands:
      - tapOn:
          id: "onboarding-next-button"
      - tapOn:
          id: "onboarding-next-button"
      - tapOn:
          id: "onboarding-skip-notifications-button"
- extendedWaitUntil:
    visible:
      id: "tab-today"
    timeout: 15000
- assertVisible:
    id: "tab-today"

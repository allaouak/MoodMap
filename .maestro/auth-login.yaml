appId: ${APP_ID}
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 15000
- tapOn:
    id: "welcome-login-button"
- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 15000
- tapOn:
    id: "login-email-input"
- inputText: "${TEST_EMAIL}"
- tapOn:
    id: "login-password-input"
- inputText: "${TEST_PASSWORD}"
# Let the React Native bridge flush onChangeText before handleSubmit reads form state
- waitForAnimationToEnd
- tapOn:
    text: "Se connecter"
- takeScreenshot: after-submit
- extendedWaitUntil:
    visible:
      id: "onboarding-next-button"
    timeout: 120000
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-skip-notifications-button"
- extendedWaitUntil:
    visible:
      id: "tab-today"
    timeout: 15000
- assertVisible:
    id: "tab-today"

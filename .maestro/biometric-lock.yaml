appId: ${APP_ID}
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 15000
- tapOn:
    id: "welcome-login-button"
- assertVisible: "Bon retour"
- tapOn:
    id: "login-email-input"
- inputText: "${TEST_EMAIL}"
- tapOn:
    id: "login-password-input"
- inputText: "${TEST_PASSWORD}"
- hideKeyboard
- tapOn:
    id: "login-submit-button"
- assertVisible:
    id: "tab-today"
- tapOn:
    id: "tab-settings"
- assertVisible:
    id: "settings-container"
- assertVisible:
    text: "Sécurité"
- scrollUntilVisible:
    text: "Verrouillage Face ID"
- tapOn:
    id: "biometric-lock-toggle"
# Simuler l'acceptation biométrique (dépend de l'appareil)
- assertVisible:
    text: "Verrouillage Face ID"

appId: ${APP_ID}
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 15000
- tapOn:
    id: "welcome-login-button"
- assertVisible: "Bon retour"
- tapOn:
    id: "login-forgot-password-button"
- assertVisible: "Mot de passe oublié"
- tapOn:
    id: "forgot-password-email-input"
- inputText: "${TEST_EMAIL}"
- hideKeyboard
- tapOn:
    id: "forgot-password-submit-button"
- assertVisible:
    id: "forgot-password-sent"
- tapOn:
    id: "forgot-password-back-to-login"
- assertVisible: "Bon retour"

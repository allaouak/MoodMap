appId: ${APP_ID}
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 15000
- tapOn:
    id: "welcome-login-button"
- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 15000
- tapOn:
    id: "login-email-input"
- inputText: "${TEST_EMAIL}"
- tapOn:
    id: "login-password-input"
- inputText: "mauvais_mot_de_passe_123"
- hideKeyboard
- tapOn:
    id: "login-submit-button"
- assertNotVisible:
    id: "tab-today"

appId: ${APP_ID}
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 15000
- tapOn:
    id: "welcome-login-button"
- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 15000
- tapOn:
    id: "login-email-input"
- inputText: "${TEST_EMAIL}"
- tapOn:
    id: "login-password-input"
- inputText: "${TEST_PASSWORD}"
- hideKeyboard
- tapOn:
    id: "login-submit-button"
- extendedWaitUntil:
    visible:
      id: "onboarding-next-button"
    timeout: 15000
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-skip-notifications-button"
- assertVisible:
    id: "tab-today"
- tapOn:
    id: "tab-settings"
- assertVisible:
    id: "settings-container"
- assertVisible:
    text: "Sécurité"
- scrollUntilVisible:
    text: "Modifier le mot de passe"
- tapOn:
    id: "change-password-toggle"
- assertVisible:
    text: "Mot de passe actuel"
- tapOn:
    id: "change-password-current-input"
- inputText: "${TEST_PASSWORD}"
- tapOn:
    id: "change-password-new-input"
- inputText: "NewPassword123!"
- tapOn:
    id: "change-password-confirm-input"
- inputText: "NewPassword123!"
- hideKeyboard
- tapOn:
    id: "change-password-submit-button"
- assertVisible:
    text: "Mot de passe mis à jour"

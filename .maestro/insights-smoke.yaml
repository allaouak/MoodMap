appId: ${APP_ID}
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 15000
- tapOn:
    id: "welcome-login-button"
- extendedWaitUntil:
    visible:
      id: "login-email-input"
    timeout: 15000
- tapOn:
    id: "login-email-input"
- inputText: "${TEST_EMAIL}"
- tapOn:
    id: "login-password-input"
- inputText: "${TEST_PASSWORD}"
# Flush bridge state then dismiss keyboard (safe: secureTextEntry is disabled in dev builds)
- waitForAnimationToEnd
- hideKeyboard
- tapOn:
    id: "login-submit-button"
- takeScreenshot: after-submit
- extendedWaitUntil:
    visible:
      id: "onboarding-next-button"
    timeout: 180000
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-next-button"
- tapOn:
    id: "onboarding-skip-notifications-button"
- extendedWaitUntil:
    visible:
      id: "tab-today"
    timeout: 15000
- assertVisible:
    id: "tab-today"
- tapOn:
    id: "tab-insights"
- assertVisible:
    id: "insights-container"
- assertVisible:
    text: "Tendances"

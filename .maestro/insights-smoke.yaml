appId: ${APP_ID}
---
- clearState
- launchApp
- extendedWaitUntil:
    visible:
      id: "welcome-login-button"
    timeout: 15000
- tapOn:
    id: "welcome-login-button"
- assertVisible: "Bon retour"
- tapOn:
    id: "login-email-input"
- inputText: "${TEST_EMAIL}"
- tapOn:
    id: "login-password-input"
- inputText: "${TEST_PASSWORD}"
- hideKeyboard
- tapOn:
    id: "login-submit-button"
- assertVisible:
    id: "tab-today"
- tapOn:
    id: "tab-insights"
- assertVisible:
    id: "insights-container"
- assertVisible:
    text: "Tendances"
